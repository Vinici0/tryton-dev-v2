server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy: common RPC (login, version, etc.)
    location /rpc/ {
        proxy_pass http://tryton:8000/rpc/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: per-database RPC and session
    location ~ ^/([^/]+)/(rpc|session)/ {
        proxy_pass http://tryton:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy: bus (notificaciones en tiempo real)
    location ~ ^/([^/]+)/bus/ {
        proxy_pass http://tryton:8000$request_uri;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
    }

    # Archivos de personalización opcionales (evitan 404 en consola)
    location = /custom.css { return 204; }
    location = /custom.js  { return 204; }

    # Archivos estáticos de SAO
    location / {
        try_files $uri $uri/ /index.html;
    }
}
